<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Julie Blankets & Bedcovers Uganda</title>
<style>
body {
  background: #f5f7fa;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
  color: #333;
}
.checkout-container {
  max-width: 700px;
  margin: 2rem auto;
  padding: 2rem;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}
.checkout-container h2 {
  text-align: center;
  color: #16a085;
  margin-bottom: 1.5rem;
  font-size: 1.8rem;
}

/* Cart Summary */
.cart-summary {
  margin-bottom: 2rem;
  background: #f0f8f5;
  padding: 1rem;
  border-radius: 8px;
}
.cart-summary h3 {
  margin-bottom: 0.8rem;
  color: #16a085;
}
.cart-summary .cart-item {
  display: flex;
  justify-content: space-between;
  padding: 0.5rem 0;
  border-bottom: 1px solid #ddd;
}
.cart-summary .cart-item span {
  font-size: 0.95rem;
}

/* Customer Details */
.checkout-details {
  margin-bottom: 2rem;
}
.checkout-details h3 {
  margin-bottom: 1rem;
  color: #16a085;
  font-size: 1.2rem;
}
.checkout-details label {
  display: block;
  font-weight: 600;
  margin-bottom: 0.3rem;
  color: #2c3e50;
}
.checkout-details input {
  width: 100%;
  padding: 0.6rem;
  margin-bottom: 1rem;
  border-radius: 6px;
  border: 1px solid #bbb;
  font-size: 1rem;
  box-sizing: border-box;
}
.checkout-form button {
  width: 100%;
  padding: 0.7rem;
  background: #16a085;
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 1rem;
  transition: 0.3s;
}
.checkout-form button:hover { background: #128066; }

@media (max-width:768px){
  .checkout-container { padding: 1.5rem; }
}
@media (max-width:480px){
  .checkout-container { padding: 1rem; }
  .checkout-form button { padding: 0.6rem; }
}
</style>
</head>
<body>

<div class="checkout-container">
  <h2>Checkout</h2>

  <!-- Cart Items (Read-only) -->
  <div class="cart-summary">
    <h3>Cart Summary</h3>
    <div id="checkout-cart-items"></div>
    <p>Total: UGX <span id="checkout-cart-total">0</span></p>
  </div>

  <!-- Customer Details Section -->
  <div class="checkout-details">
    <h3>Customer Details</h3>
    <label for="customerName">Full Name</label>
    <input type="text" id="customerName" placeholder="Enter your full name" required>

    <label for="customerEmail">Email</label>
    <input type="email" id="customerEmail" placeholder="Enter your email" required>

    <label for="customerPhone">Phone Number</label>
    <input type="text" id="customerPhone" placeholder="Enter your phone number" required>
  </div>

  <form class="checkout-form" onsubmit="submitOrder(event)">
    <button type="submit">Place Order</button>
  </form>
</div>

<script>
// ===== Checkout JS =====
let cartItems = JSON.parse(localStorage.getItem("checkoutCart")) || [];

function renderCheckoutCart() {
  const container = document.getElementById("checkout-cart-items");
  const totalElem = document.getElementById("checkout-cart-total");
  container.innerHTML = "";
  let total = 0;

  cartItems.forEach(item => {
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <span>${item.name}</span>
      <span>UGX ${Number(item.price).toLocaleString()}</span>
    `;
    container.appendChild(div);
    total += Number(item.price);
  });
  totalElem.textContent = total.toLocaleString();
}

function submitOrder(e) {
  e.preventDefault();
  if(cartItems.length === 0){
    alert("Your cart is empty!");
    return;
  }

  const customerName = document.getElementById("customerName").value.trim();
  const customerEmail = document.getElementById("customerEmail").value.trim();
  const customerPhone = document.getElementById("customerPhone").value.trim();

  const order = {
    customer: { name: customerName, email: customerEmail, phone: customerPhone },
    items: cartItems,
    total: cartItems.reduce((sum, item) => sum + Number(item.price), 0),
    date: new Date().toISOString()
  };

  let orders = JSON.parse(localStorage.getItem("orders")) || [];
  orders.push(order);
  localStorage.setItem("orders", JSON.stringify(orders));

  cartItems = [];
  localStorage.setItem("checkoutCart", JSON.stringify(cartItems));
  alert("Order placed successfully!");
  window.location.href = "index.html";
}

// Initialize
renderCheckoutCart();
</script>

</body>
</html>
