<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Julie Blankets & Bedcovers Uganda</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin:0;
  padding:0;
  background:#f5f7fa;
  color:#333;
}
header { background:#16a085; color:white; padding:1rem; text-align:center; }
h2,h3 { margin:0.5rem 0; }
button { cursor:pointer; padding:0.5rem 1rem; margin:0.2rem; }
.admin-dashboard { padding:1rem; }
#addProductForm input, #addProductForm select { margin:0.3rem 0; padding:0.3rem; display:block; width:100%; }
.admin-product-card { border:1px solid #ccc; padding:0.5rem; margin:0.5rem 0; border-radius:5px; background:white; }
#productGridAdmin { margin-top:1rem; }
</style>
</head>
<body>

<header>
  <h1>Admin Panel - Julie Blankets & Bedcovers Uganda</h1>
</header>

<section id="adminLoginSection">
  <h2>Admin Login</h2>
  <input type="password" id="adminPass" placeholder="Enter password">
  <button onclick="loginAdmin()">Login</button>
</section>

<section class="admin-dashboard" id="adminDashboard" style="display:none;">
  <h2>Dashboard</h2>

  <div id="addProductForm">
    <h3>Add New Product</h3>
    <input type="text" id="newName" placeholder="Product Name">
    <input type="number" id="newPrice" placeholder="Price UGX">
    <select id="newCategory">
      <option value="">Select Category</option>
      <option value="blankets">Blankets</option>
      <option value="bedcovers">Bedcovers</option>
      <option value="bedsheets">Bedsheets</option>
      <option value="curtains">Curtains</option>
      <option value="pillows">Pillows</option>
    </select>
    <input type="file" id="newImgFile" accept="image/*">
    <button onclick="addProduct()">Add Product</button>
  </div>

  <h3>Products List</h3>
  <div id="productGridAdmin"></div>

  <button onclick="logoutAdmin()">Logout</button>
</section>

<script>
// ===== Constants =====
const ADMIN_PASS = "1234";
const PRODUCTS_KEY = "productsStorage";

// ===== State =====
let isAdmin = false;
let products = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];

// ===== Initialize =====
document.addEventListener("DOMContentLoaded", () => {
  const adminLoggedIn = sessionStorage.getItem("isAdminLoggedIn") === "true";
  if(adminLoggedIn){
    document.getElementById("adminLoginSection").style.display = "none";
    document.getElementById("adminDashboard").style.display = "block";
    renderAdminProducts();
  }
});

// ===== Admin Login =====
function loginAdmin(){
  const password = document.getElementById("adminPass").value;
  if(password===ADMIN_PASS){
    sessionStorage.setItem("isAdminLoggedIn","true");
    isAdmin = true;
    document.getElementById("adminLoginSection").style.display="none";
    document.getElementById("adminDashboard").style.display="block";
    renderAdminProducts();
    alert("Admin logged in!");
  } else alert("Invalid password!");
}

// ===== Logout =====
function logoutAdmin(){
  sessionStorage.removeItem("isAdminLoggedIn");
  location.reload();
}

// ===== Add Product =====
function addProduct(){
  if(!isAdmin) return alert("Login as admin to add products!");
  const name = document.getElementById("newName").value.trim();
  const price = parseInt(document.getElementById("newPrice").value);
  const category = document.getElementById("newCategory").value;
  const fileInput = document.getElementById("newImgFile");
  if(!name || isNaN(price) || !category || fileInput.files.length===0) return alert("Fill all fields and select an image!");
  const reader = new FileReader();
  reader.onload = e => {
    products.push({name, price, category, img:e.target.result, sales:0});
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
    renderAdminProducts();
    document.getElementById("newName").value="";
    document.getElementById("newPrice").value="";
    document.getElementById("newCategory").value="";
    fileInput.value="";
    alert("Product added successfully!");
  };
  reader.readAsDataURL(fileInput.files[0]);
}

// ===== Edit / Remove Products =====
function renderAdminProducts(){
  const grid = document.getElementById("productGridAdmin");
  grid.innerHTML = "";
  products.forEach((item,index)=>{
    const div = document.createElement("div");
    div.className="admin-product-card";
    div.innerHTML = `
      <h4>${item.name}</h4>
      <p>UGX ${item.price.toLocaleString()}</p>
      <p>Category: ${item.category}</p>
      <button onclick="editProduct(${index})">Edit</button>
      <button onclick="removeProduct(${index})">Remove</button>
    `;
    grid.appendChild(div);
  });
}

function editProduct(index){
  const newName = prompt("New name:", products[index].name);
  if(newName) products[index].name = newName;
  const newPrice = prompt("New price:", products[index].price);
  if(newPrice) products[index].price = parseInt(newPrice);
  const newCategory = prompt("New category:", products[index].category);
  if(newCategory) products[index].category = newCategory;
  localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
  renderAdminProducts();
}

function removeProduct(index){
  if(confirm(`Remove "${products[index].name}"?`)){
    products.splice(index,1);
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
    renderAdminProducts();
  }
}
</script>

</body>
</html>
